# /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
# command:
# rsync  -avz --rsync-path="sudo rsync" ./config/k3s/traefik-config.yaml fedora@charlie:/var/lib/rancher/k3s/server/manifests/traefik-config.yaml
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
          spec:
            externalTrafficPolicy: Local
    logs:
        access:
          enabled: true
          format: json
          fields:
           headers:
            defaultMode: keep
            names:
             User-Agent: keep
    experimental:
        plugins:
          blockuseragent:
            moduleName: "github.com/agence-gaya/traefik-plugin-blockuseragent"
            version: "v0.1.8"
    providers:
      kubernetesIngress:
        allowExternalNameServices: true
        allowEmptyServices: true
      kubernetesCRD:
        allowExternalNameServices: true
        allowEmptyServices: true
    additionalArguments:
      - "--certificatesresolvers.default.acme.email=danicosme@proton.me"
      - "--certificatesresolvers.default.acme.storage=/data/acme.json"
      - "--certificatesresolvers.default.acme.httpchallenge.entrypoint=web"
      - "--log.level=WARN"
    dashboard:
      enabled: true
    api:
      dashboard: true
    entryPoints:
      web:
        address: ":80"
      websecure:
        address: ":443"
