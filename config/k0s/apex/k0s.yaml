apiVersion: k0s.k0sproject.io/v1beta1
kind: ClusterConfig
metadata:
  name: k0s
  namespace: kube-system
spec:
  api:
    address: 100.107.173.38 # NOTE: Tailscale ip
    k0sApiPort: 9443
    port: 6443
    sans:
      - 10.0.0.59
      - 100.107.173.38
      - 2607:fa49:1e42:2d00::e92b
      - 2607:fa49:1e42:2d00:f3a2:330f:e7b1:79e2
      - fdaa:a676:19a6:4fa8:10b4:fd07:a58b:cc90
      - fe80::b975:4e46:5f11:4f0c
      - fd7a:115c:a1e0::2a36:ad26
      - fe80::caa8:3dd5:aa7c:f0ef
    ca:
      certificatesExpireAfter: 8760h0m0s
      expiresAfter: 87600h0m0s
  extensions:
    helm:
      concurrencyLevel: 5
  installConfig:
    users:
      kineUser: kube-apiserver
      konnectivityUser: konnectivity-server
      kubeAPIserverUser: kube-apiserver
      kubeSchedulerUser: kube-scheduler
  konnectivity:
    adminPort: 8133
    agentPort: 8132
  network:
    provider: kuberouter
    clusterDomain: cluster.local
    dualStack:
      enabled: false
    kubeProxy:
      iptables:
        minSyncPeriod: 0s
        syncPeriod: 0s
      ipvs:
        minSyncPeriod: 0s
        syncPeriod: 0s
        tcpFinTimeout: 0s
        tcpTimeout: 0s
        udpTimeout: 0s
      metricsBindAddress: 0.0.0.0:10249
      mode: iptables
      nftables:
        minSyncPeriod: 0s
        syncPeriod: 0s
    kuberouter:
      autoMTU: true
      hairpin: Enabled
      metricsPort: 8080
    nodeLocalLoadBalancing:
      enabled: false
      envoyProxy:
        apiServerBindPort: 7443
        konnectivityServerBindPort: 7132
      type: EnvoyProxy
    podCIDR: 10.244.0.0/16
    serviceCIDR: 10.96.0.0/12
  storage:
    type: kine
    kine:
      dataSource: "sqlite:///mnt/kube/db/state.db"
  telemetry:
    enabled: false
