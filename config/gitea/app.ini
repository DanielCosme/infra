APP_NAME = Gitea

[server]
PROTOCOL = http
HTTP_ADDR = 0.0.0.0
HTTP_PORT = 4001
DOMAIN       = git.danicos.dev
ROOT_URL     = https://git.danicos.dev

[database]
DB_TYPE = sqlite3

[service]
DISABLE_REGISTRATION = true

[repository]
ROOT = /datapool/gitea/data/gitea-repositories

[lfs]
PATH = /datapool/gitea/data/lfs

[log]
MODE = console
LEVEL = info
ROOT_PATH = /datapool/gitea/log
