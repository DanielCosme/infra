apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ape-wildcard-cert
spec:
  secretName: ape-wildcard-cert # Kubernetes Secret where the cert will be stored
  issuerRef:
    name: letsencrypt-gateway # Your ClusterIssuer name
    kind: ClusterIssuer
  dnsNames:
    - "*.danicos.me"
    - "*.danicos.dev"
